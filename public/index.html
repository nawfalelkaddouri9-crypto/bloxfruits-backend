<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits Stock</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 10px; padding: 20px; max-width: 400px; margin: auto; }
        .fruit { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .price { color: #fbbf24; }
    </style>
</head>
<body>
    <h1>🍎 Normal Stock</h1>
    <div class="card" id="list">Laden...</div>
    <p id="time"></p>

    <script>
        async function load() {
            const res = await fetch('/api/stock');
            const data = await res.json();
            if (data.current) {
                document.getElementById('list').innerHTML = data.current.map(f => 
                    `<div class="fruit"><span>${f.name}</span><span class="price">$${f.price.toLocaleString()}</span></div>`
                ).join('');
                document.getElementById('time').innerText = "Update: " + new Date(data.lastUpdated).toLocaleTimeString();
            }
        }
        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
