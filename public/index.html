<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Blox Fruits Stock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f1a; --surface: #161827; --card: #1e2236; --border: #2a2f4a;
      --accent: #f7b731; --accent2: #eb4d4b; --accent3: #6c5ce7;
      --text: #e8eaf6; --muted: #7f8cbf; --green: #00b894;
      --radius: 14px; --shadow: 0 4px 24px rgba(0,0,0,0.45);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 32px; }

    header {
      background: linear-gradient(135deg, #1a1c2e 0%, #0d0f1a 100%);
      border-bottom: 2px solid var(--accent);
      padding: 18px 20px 14px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 20px; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .live-badge {
      margin-left: auto; background: var(--green); color: #000;
      font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px;
      display: flex; align-items: center; gap: 5px;
    }
    .live-badge::before { content: ''; width: 7px; height: 7px; background: #fff; border-radius: 50%; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    main { padding: 20px 14px 0; max-width: 560px; margin: 0 auto; }

    .status-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--muted); margin-bottom: 18px;
    }
    #refresh-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 700;
    }

    .history-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); border-radius: 10px;
      font-size: 12px; font-weight: 700; cursor: pointer; text-align: center;
    }
    .tab-btn.active-current { background: var(--accent); color: #000; border-color: var(--accent); }
    .tab-btn.active-last { background: var(--accent3); color: #fff; border-color: var(--accent3); }
    .tab-btn.active-before { background: var(--surface); color: var(--text); border-color: var(--muted); }

    .section-label {
      display: flex; align-items: center; gap: 8px; font-size: 12px;
      font-weight: 700; text-transform: uppercase; margin: 16px 0 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 8px; }

    .fruit-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 12px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      box-shadow: var(--shadow); position: relative; overflow: hidden; text-align: center;
    }
    .fruit-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }

    .fruit-icon-text {
      width: 64px; height: 64px; background: var(--border); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: var(--accent);
    }
    .fruit-name { font-size: 13px; font-weight: 700; }
    .fruit-price { font-size: 12px; color: var(--accent); font-weight: 600; }
    .beli { font-size: 10px; color: var(--muted); }

    .stock-panel { display: none; }
    .stock-panel.active { display: block; }
    .empty-state { text-align: center; color: var(--muted); padding: 28px 0; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <span class="logo">🍎</span>
  <h1>Blox Fruits <span>Stock</span></h1>
  <span class="live-badge">LIVE</span>
</header>

<main>
  <div class="status-bar">
    <div>Last updated: <strong id="last-updated">—</strong></div>
    <button id="refresh-btn" onclick="loadStock()">↻ Refresh</button>
  </div>

  <div class="history-tabs">
    <div class="tab-btn active-current" onclick="showPanel('current')">🟡 Current</div>
    <div class="tab-btn" onclick="showPanel('last')">Purple Last</div>
    <div class="tab-btn" onclick="showPanel('before')">⚫ Before</div>
  </div>

  <div id="panel-current" class="stock-panel active">
    <div class="section-label"><span class="dot"></span> Normal Stock</div>
    <div id="current-normal" class="items-grid"><div class="empty-state">Loading...</div></div>
  </div>

  <div id="panel-last" class="stock-panel">
    <div class="section-label"><span class="dot"></span> Normal Stock</div>
    <div id="last-normal" class="items-grid"><div class="empty-state">No data yet</div></div>
  </div>

  <div id="panel-before" class="stock-panel">
    <div class="section-label"><span class="dot"></span> Normal Stock</div>
    <div id="before-normal" class="items-grid"><div class="empty-state">No data yet</div></div>
  </div>
</main>

<script>
  function renderItems(containerId, items) {
    const el = document.getElementById(containerId);
    if (!items || items.length === 0) {
      el.innerHTML = '<div class="empty-state">No data available</div>';
      return;
    }
    el.innerHTML = items.map(item => `
      <div class="fruit-card">
        <div class="fruit-icon-text">${item.name.slice(0, 2)}</div>
        <div class="fruit-name">${item.name}</div>
        <div class="fruit-price">${item.price.toLocaleString()} <span class="beli">Beli</span></div>
      </div>
    `).join("");
  }

  function showPanel(name) {
    document.querySelectorAll(".stock-panel").forEach(p => p.classList.remove("active"));
    document.getElementById("panel-" + name).classList.add("active");
    document.querySelectorAll(".tab-btn").forEach(t => t.className = "tab-btn");
    const map = { current: "active-current", last: "active-last", before: "active-before" };
    const idx = { current: 0, last: 1, before: 2 };
    document.querySelectorAll(".tab-btn")[idx[name]].classList.add(map[name]);
  }

  async function loadStock() {
    try {
      const res = await fetch("/api/stock");
      const data = await res.json();
      if (data.current) {
        renderItems("current-normal", data.current.normal);
        renderItems("last-normal", data.last ? data.last.normal : []);
        renderItems("before-normal", data.beforeLast ? data.beforeLast.normal : []);
        document.getElementById("last-updated").textContent = new Date(data.lastUpdated).toLocaleTimeString();
      }
    } catch(err) { console.error(err); }
  }

  loadStock();
  setInterval(loadStock, 120000);
</script>
</body>
</html>
